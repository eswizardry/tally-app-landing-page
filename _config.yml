# Feature List
features                                  :

  - title                                 : Track Every Expense
    description                           : Log income, expenses, and transfers across multiple accounts. Know exactly where your money goes.
    fontawesome_icon_name                 : wallet

  - title                                 : Budgets & Categories
    description                           : Set spending limits per category and see at a glance how much you have left each month.
    fontawesome_icon_name                 : chart-pie

  - title                                 : Recurring Transactions
    description                           : Set up automatic entries for salaries, rent, subscriptions, and any regular payment.
    fontawesome_icon_name                 : sync-alt

  - title                                 : Financial Tools
    description                           : Built-in calculators for compound savings, loans, and extra payments — no separate app needed.
    fontawesome_icon_name                 : calculator

  - title                                 : Multi-Currency Support
    description                           : Manage accounts in any currency. Live exchange rates keep your balances accurate.
    fontawesome_icon_name                 : coins

  - title                                 : Cloud Backup & Export
    description                           : Back up your data to your own Google Drive and export to CSV anytime — your data stays yours.
    fontawesome_icon_name                 : cloud-upload-alt



